<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f1f1f" />
    <title>vrn — городской бот</title>
  </head>
  <body>
    <div id="root">
      <div
        class="vrn-static-fallback"
        style="
          font-family: system-ui, sans-serif;
          padding: 1.5rem;
          max-width: 22rem;
          margin: 2rem auto;
          color: #111;
          line-height: 1.5;
        "
      >
        <p style="margin: 0 0 0.75rem"><strong>Загрузка vrn…</strong></p>
        <p style="margin: 0 0 0.75rem; font-size: 0.9rem">
          Если экран так и остаётся белым: откройте приложение через dev-сервер, а не
          двойным щелчком по файлу на диске.
        </p>
        <p style="margin: 0 0 0.5rem; font-size: 0.9rem">В терминале в папке проекта:</p>
        <pre
          style="
            margin: 0 0 0.75rem;
            padding: 0.75rem 1rem;
            background: #eee;
            border-radius: 12px;
            font-size: 0.85rem;
            overflow: auto;
          "
        ><code>npm run dev</code></pre>
        <p style="margin: 0; font-size: 0.9rem">
          Затем в браузере:
          <strong>http://localhost:5173</strong> (или порт из вывода терминала).
        </p>
      </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
